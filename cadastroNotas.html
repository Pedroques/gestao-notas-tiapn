<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Cadastro de Nota Promissória</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/cadastroNotas.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">

            <a class="navbar-brand text-white" href="/index.html">
                Gestão de Vendas - Sistema de Notas
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="menu">

                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="/index.html">
                            Página Inicial
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/cadastroNotas.html">
                            Venda
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/cadastrarCliente.html">
                            Cadastrar Cliente
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/relatorios.html">
                            Relatórios
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/cotasAberto.html">
                            Cotas Aberto
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/vendedor.html">
                            Vendedor
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/produtos.html">
                            Produtos
                        </a>
                    </li>

                </ul>

            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h4>Cadastro de Nota Promissória</h4>

        <div class="card p-4">

            <form>

                <div class="row">

                    <div class="col-md-4">
                        <label>Nome do Cliente</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label>Telefone</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label>CPF</label>
                        <input type="text" class="form-control">
                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-4">
                        <label>Produto / Descrição</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-2">
                        <label>Valor Total</label>
                        <input type="number" class="form-control">
                    </div>

                    <div class="col-md-2">
                        <label>Nº Parcelas</label>
                        <input type="number" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label>Data da Primeira Parcela</label>
                        <input type="date" class="form-control">
                    </div>

                </div>

                <div class="mt-4">

                    <button class="btn btn-success">
                        Salvar Nota
                    </button>

                    <button class="btn btn-secondary">
                        Limpar
                    </button>

                </div>

            </form>

        </div>

    </div>

    <footer class="footer mt-5">
        <div class="container text-center">

            <p class="mb-1">
                Sistema de Gestão de Vendas
            </p>

            <small>
                © 2026 - Todos os direitos reservados
            </small>

        </div>
    </footer>
</body>

</html>
