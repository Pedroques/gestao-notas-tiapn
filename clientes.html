    <meta charset="UTF-8">

</head>

        <div class="container">

            <a class="navbar-brand text-white" href="/index.html">
                Gestão de Vendas - Sistema de Notas
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="menu">

                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="/index.html">
                            Página Inicial
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/cadastroNotas.html">
                            Venda
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/clientes.html">
                            Cliente
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/relatorios.html">

                    <li class="nav-item">
                        <a class="nav-link" href="/contasAberto.html">
                            Contas Aberto

                    <li class="nav-item">
                        <a class="nav-link" href="/vendedor.html">
                            Vendedor

                        </a>
                    </li>

                </ul>

            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <h2 class="form-title">Cadastrar Cliente</h2>

        <form class="mt-4">
            <div class="row mb-3 align-items-end">
                <div class="col-md-2 col-sm-4">
                    <label class="form-label text-dark">Cód. Cliente</label>
                    <div class="d-flex align-items-center">
                        <input type="text" class="form-control form-control-custom me-2">
                        <img src="/img/lupa.png" alt="buscar" class="iconeLupa">
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-5">
                    <label class="form-label text-dark">Nome do Cliente</label>
                    <input type="text" class="form-control form-control-custom">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-dark">CPF</label>
                    <input type="text" class="form-control form-control-custom">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-dark">Celular</label>
                    <input type="text" class="form-control form-control-custom">
                </div>
            </div>

            <h3 class="section-title mt-4 pt-2">Endereço</h3>

            <div class="row mb-3">
                <div class="col-md-8">
                    <label class="form-label text-dark">Rua</label>
                    <input type="text" class="form-control form-control-custom">
                </div>
                <div class="col-md-1">
                    <label class="form-label text-dark">Nº</label>
                    <input type="text" class="form-control form-control-custom">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-dark">Complemento</label>
                    <input type="text" class="form-control form-control-custom">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label text-dark">Bairro</label>
                    <input type="text" class="form-control form-control-custom">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-dark">Cidade</label>
                    <input type="text" class="form-control form-control-custom">
                </div>
                <div class="col-md-1">
                    <label class="form-label text-dark">UF</label>
                    <input type="text" class="form-control form-control-custom">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-dark">CEP</label>
                    <input type="text" class="form-control form-control-custom">
                </div>
            </div>

            <div class="row mb-5">
                <div class="col-md-2">
                    <label class="form-label text-dark">Código do Vendedor</label>
                    <input type="text" class="form-control form-control-custom">
                </div>
            </div>

            <div class="row">
                <div class="col-12 d-flex justify-content-end flex-wrap gap-3">
                    <button type="button" class="btnCriar btn btn-action">Criar</button>
                    <button type="button" class="btnEditar btn btn-action">Editar</button>
                    <button type="button" class="btnSalvar btn btn-action">Salvar</button>
                    <button type="button" class="btnCancelar btn btn-action">Cancelar</button>
                </div>
            </div>

        </form>
    </div>

    <footer class="footer mt-auto">
        <div class="container text-center">
            <p class="mb-1">Sistema de Gestão de Vendas</p>
            <small>© 2026 - Todos os direitos reservados</small>
        </div>
    </footer>


</body>

</html>
